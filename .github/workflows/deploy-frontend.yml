name: Deploy Frontend to GCP

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: # Allow manual trigger

env:
  NODE_VERSION: '18'
  REGISTRY: gcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests
        working-directory: ./frontend
        run: npm run test -- --run
        continue-on-error: true

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.example.com' }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: Deploy to Cloud Storage
        working-directory: ./frontend
        run: |
          BUCKET_NAME="${{ secrets.GCS_BUCKET_NAME }}"
          
          # Upload all files with cache busting headers
          gsutil -m cp -r dist/* gs://$BUCKET_NAME/
          
          # Set HTML files with no-cache headers
          for file in dist/*.html; do
            gsutil -h "Cache-Control:no-cache,max-age=0" \
                   -h "Content-Type:text/html" \
                   cp "$file" gs://$BUCKET_NAME/
          done
          
          # Set CSS/JS with long cache TTL
          gsutil -m -h "Cache-Control:public,max-age=31536000" \
                 cp dist/assets/** gs://$BUCKET_NAME/assets/
          
          echo "✅ Files uploaded to gs://$BUCKET_NAME"

      - name: Invalidate Cloud CDN Cache
        run: |
          gcloud compute backend-buckets invalidate-cdn-cache \
            pollpilot-frontend-backend \
            --path="/*"
          echo "✅ CDN cache invalidated"

      - name: Verify Deployment
        run: |
          BUCKET_NAME="${{ secrets.GCS_BUCKET_NAME }}"
          
          # Check if index.html exists
          if gsutil -q stat gs://$BUCKET_NAME/index.html; then
            echo "✅ index.html deployed successfully"
          else
            echo "❌ Deployment verification failed"
            exit 1
          fi

      - name: Get Deployment URL
        id: deployment
        run: |
          echo "url=https://storage.googleapis.com/${{ secrets.GCS_BUCKET_NAME }}/index.html" >> $GITHUB_OUTPUT

      - name: Post Deployment Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Frontend Deployment Successful**\n\n🚀 Preview: [${{ steps.deployment.outputs.url }}](${{ steps.deployment.outputs.url }})`
            })

      - name: Slack Notification (Success)
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ PollPilot Frontend deployed successfully to GCP",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*PollPilot Frontend Deployment*\n✅ Status: Success\n🔗 Deployed to: GCP Cloud Storage\n👤 By: ${{ github.actor }}\n📝 Commit: ${{ github.event.head_commit.message }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack Notification (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ PollPilot Frontend deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*PollPilot Frontend Deployment*\n❌ Status: Failed\n🔗 Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n👤 By: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
