server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:pollpilot;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  cache:
    type: caffeine

security:
  jwt:
    secret: ${JWT_SECRET:replace-with-strong-32-plus-byte-secret-key-2026}
    issuer: ${JWT_ISSUER:pollpilot}
    accessTokenMinutes: 30
    refreshTokenDays: 14

google:
  maps:
    apiKey: ${GOOGLE_MAPS_API_KEY:}
  dialogflow:
    projectId: ${DIALOGFLOW_PROJECT_ID:}
  translate:
    apiKey: ${GOOGLE_TRANSLATE_API_KEY:}

firebase:
  serviceAccountPath: ${FIREBASE_SERVICE_ACCOUNT:}

cors:
  allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
